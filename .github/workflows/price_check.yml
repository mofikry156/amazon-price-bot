name: Amazon Price Monitor

on:
  schedule:
    # Runs at the top of every hour (GitHub Actions timing isn't exact,
    # may run a few minutes late during high load)
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

jobs:
  check-prices:
    runs-on: ubuntu-latest
    concurrency:
      group: price-monitor
      cancel-in-progress: false
    permissions:
      contents: write  # needed so the workflow can commit price_history.json back
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python price_monitor.py

      - name: Commit updated price history
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add price_history.json
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git pull --rebase origin main
          git push
